<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200">
  <defs>
    <radialGradient id="neb" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#44c8ff" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#8c5aff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#neb)" />
  <!-- subtle holographic grid -->
  <g stroke="#5ef2ff" stroke-opacity="0.06" stroke-width="1">
    <!-- vertical lines -->
    <path d="M0 100 L1200 100" />
    <path d="M0 300 L1200 300" />
    <path d="M0 500 L1200 500" />
    <path d="M0 700 L1200 700" />
    <path d="M0 900 L1200 900" />
  </g>
  <!-- scattered larger stars -->
  <g fill="#ffffff" fill-opacity="0.9">
    <circle cx="980" cy="200" r="2" />
    <circle cx="240" cy="160" r="1.8" />
    <circle cx="420" cy="360" r="1.6" />
    <circle cx="760" cy="540" r="2.2" />
    <circle cx="110" cy="820" r="1.6" />
  </g>
</svg>